ServerTokens Prod
ServerSignature Off

<VirtualHost *:8080>
    ServerName control-asistencia-v1-0.up.railway.app
    DocumentRoot /app/public
    
    <Directory /app/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
