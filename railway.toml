[build]
  builder = "NIXPACKS"
  buildCommand = "composer install --ignore-platform-reqs --no-dev --optimize-autoloader && php artisan optimize && chmod -R 755 storage bootstrap/cache"

[deploy]
  startCommand = "vendor/bin/heroku-php-apache2 public/"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
